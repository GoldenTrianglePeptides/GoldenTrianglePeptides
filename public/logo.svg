<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Golden Triangle Peptides mark">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d98a"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a9791b"/>
    </linearGradient>
    <radialGradient id="bead" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#f5e6ad"/>
      <stop offset="0.6" stop-color="#cda636"/>
      <stop offset="1" stop-color="#8f6515"/>
    </radialGradient>
  </defs>

  <!-- Texas outline (stylized) -->
  <path d="M44 40 L86 40 L86 56 L104 56 L150 62 L156 86 L142 104 L138 128
           L120 142 L116 162 L100 158 L94 132 L78 124 L52 122 L46 84
           L34 84 L34 60 L44 60 Z"
        fill="none" stroke="#16243f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Peptide molecule chain along the left/bottom -->
  <g stroke="#b8901f" stroke-width="3">
    <line x1="40" y1="74" x2="56" y2="64"/>
    <line x1="56" y1="64" x2="70" y2="70"/>
    <line x1="40" y1="74" x2="44" y2="92"/>
    <line x1="44" y1="92" x2="58" y2="104"/>
    <line x1="58" y1="104" x2="74" y2="118"/>
    <line x1="74" y1="118" x2="92" y2="124"/>
  </g>
  <g>
    <circle cx="40" cy="74" r="9" fill="url(#bead)"/>
    <circle cx="56" cy="64" r="6" fill="url(#bead)"/>
    <circle cx="70" cy="70" r="5" fill="url(#bead)"/>
    <circle cx="44" cy="92" r="8" fill="url(#bead)"/>
    <circle cx="58" cy="104" r="7" fill="url(#bead)"/>
    <circle cx="74" cy="118" r="6" fill="url(#bead)"/>
    <circle cx="92" cy="124" r="5" fill="url(#bead)"/>
  </g>

  <!-- Golden triangle -->
  <polygon points="116,52 152,114 80,114" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="116,76 140,110 92,110" fill="url(#gold)"/>
  <!-- Lone star -->
  <path d="M132 96 l2.4 5 5.5 .6 -4.1 3.7 1.1 5.4 -4.9 -2.7 -4.9 2.7 1.1 -5.4 -4.1 -3.7 5.5 -.6 z" fill="#16243f"/>
</svg>
