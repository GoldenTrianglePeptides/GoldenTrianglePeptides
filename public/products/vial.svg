<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 440" width="300" height="440" role="img" aria-label="Golden Triangle Peptides research vial">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#eef2f5"/>
      <stop offset="0.5" stop-color="#f7fafc"/>
      <stop offset="0.85" stop-color="#dde5ea"/>
      <stop offset="1" stop-color="#eef2f5"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3a5c"/>
      <stop offset="0.5" stop-color="#16243f"/>
      <stop offset="1" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa3ad"/>
      <stop offset="0.25" stop-color="#e6eaee"/>
      <stop offset="0.5" stop-color="#c2c9cf"/>
      <stop offset="0.75" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#9aa3ad"/>
    </linearGradient>
    <linearGradient id="goldLbl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7c873"/>
      <stop offset="0.5" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#a9791b"/>
    </linearGradient>
    <radialGradient id="beadLbl" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#e7c873"/>
      <stop offset="1" stop-color="#a9791b"/>
    </radialGradient>
  </defs>

  <!-- soft shadow under vial -->
  <ellipse cx="150" cy="420" rx="78" ry="12" fill="#000000" opacity="0.10"/>

  <!-- glass body -->
  <path d="M82 150
           q0 -14 14 -16
           l8 -30 h92 l8 30
           q14 2 14 16
           v232
           q0 24 -24 24 h-104 q-24 0 -24 -24 z"
        fill="url(#glass)" stroke="#c4ccd3" stroke-width="2"/>

  <!-- powder fill at bottom -->
  <path d="M62 330 h176 v52 q0 24 -24 24 h-128 q-24 0 -24 -24 z" fill="#f4f4ef"/>
  <path d="M62 330 q44 -10 88 0 q44 10 88 0 v6 q-44 10 -88 0 q-44 -10 -88 0 z" fill="#e9e9e2"/>

  <!-- glass highlight -->
  <rect x="92" y="116" width="14" height="280" rx="7" fill="#ffffff" opacity="0.45"/>

  <!-- silver crimp band -->
  <rect x="104" y="78" width="92" height="30" rx="4" fill="url(#silver)" stroke="#8b939b" stroke-width="0.5"/>

  <!-- navy flip cap -->
  <rect x="100" y="30" width="100" height="52" rx="12" fill="url(#cap)"/>
  <g stroke="#0f1a2e" stroke-width="1.2" opacity="0.5">
    <line x1="116" y1="40" x2="116" y2="74"/>
    <line x1="130" y1="40" x2="130" y2="74"/>
    <line x1="144" y1="40" x2="144" y2="74"/>
    <line x1="158" y1="40" x2="158" y2="74"/>
    <line x1="172" y1="40" x2="172" y2="74"/>
    <line x1="186" y1="40" x2="186" y2="74"/>
  </g>
  <ellipse cx="150" cy="36" rx="50" ry="9" fill="#34466b" opacity="0.7"/>

  <!-- ===== LABEL ===== -->
  <g>
    <rect x="74" y="196" width="152" height="170" rx="6" fill="#ffffff" stroke="#e3e6ea" stroke-width="1"/>
    <!-- gold trim -->
    <line x1="86" y1="210" x2="214" y2="210" stroke="url(#goldLbl)" stroke-width="2"/>

    <!-- logo mark: Texas hint + triangle + star + molecule -->
    <g transform="translate(150 246) scale(0.5)">
      <path d="M-44 -28 L-8 -28 L-8 -16 L8 -16 L46 -12 L52 8 L40 24 L36 44
               L18 54 L14 70 L0 66 L-6 44 L-22 38 L-44 36 L-46 0 L-56 0 L-56 -20 L-44 -20 Z"
            fill="none" stroke="#16243f" stroke-width="3" stroke-linejoin="round"/>
      <g stroke="#b8901f" stroke-width="2.5">
        <line x1="-50" y1="-6" x2="-36" y2="-16"/>
        <line x1="-50" y1="-6" x2="-46" y2="12"/>
        <line x1="-46" y1="12" x2="-32" y2="24"/>
        <line x1="-32" y1="24" x2="-16" y2="38"/>
      </g>
      <circle cx="-50" cy="-6" r="7" fill="url(#beadLbl)"/>
      <circle cx="-36" cy="-16" r="5" fill="url(#beadLbl)"/>
      <circle cx="-46" cy="12" r="6" fill="url(#beadLbl)"/>
      <circle cx="-32" cy="24" r="5" fill="url(#beadLbl)"/>
      <circle cx="-16" cy="38" r="4" fill="url(#beadLbl)"/>
      <polygon points="22,-26 54,28 -10,28" fill="none" stroke="url(#goldLbl)" stroke-width="4"/>
      <polygon points="22,-4 44,26 0,26" fill="url(#goldLbl)"/>
      <path d="M36 12 l1.8 3.8 4.2 .4 -3.1 2.8 .8 4.1 -3.7 -2 -3.7 2 .8 -4.1 -3.1 -2.8 4.2 -.4 z" fill="#16243f"/>
    </g>

    <!-- wordmark -->
    <text x="150" y="294" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" letter-spacing="1.5" fill="#16243f">GOLDEN TRIANGLE</text>
    <g>
      <line x1="100" y1="303" x2="120" y2="303" stroke="url(#goldLbl)" stroke-width="1.2"/>
      <text x="150" y="307" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="4" fill="#c9a227">PEPTIDES</text>
      <line x1="180" y1="303" x2="200" y2="303" stroke="url(#goldLbl)" stroke-width="1.2"/>
    </g>
    <text x="150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" letter-spacing="1.5" fill="#16243f">PRECISION PEPTIDES. PURPOSE DRIVEN.</text>

    <!-- research-use banner -->
    <rect x="74" y="330" width="152" height="36" rx="0" fill="#16243f"/>
    <rect x="74" y="362" width="152" height="4" fill="#c9a227"/>
    <line x1="74" y1="330" x2="226" y2="330" stroke="#c9a227" stroke-width="2"/>
    <text x="150" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" letter-spacing="1" fill="#ffffff">RESEARCH USE ONLY</text>
    <text x="150" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" letter-spacing="0.5" fill="#dbe2ea">NOT FOR HUMAN CONSUMPTION</text>
  </g>
</svg>
